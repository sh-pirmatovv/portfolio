name: ci

on:
  push:
    branches: ["main", "codex/**"]
  pull_request:

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Install JS dependencies
        run: corepack enable && pnpm install
      - name: Typecheck
        run: pnpm typecheck
      - name: Build
        run: pnpm build

